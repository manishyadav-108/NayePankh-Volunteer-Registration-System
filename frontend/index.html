<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NayePankh Foundation - Volunteer Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-md p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-orange-600">NayePankh <span class="text-green-600">Foundation</span></h1>
            <a href="login.html" class="text-gray-600 hover:text-orange-600 font-medium">Admin Login</a>
        </div>
    </nav>

    <div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-lg border-t-4 border-orange-500 mb-10">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-2">Join Us as a Volunteer</h2>
        <p class="text-center text-gray-600 mb-6">Every small effort creates a big change. Fill out the form below to get started!</p>

        <div id="message" class="hidden p-4 mb-4 rounded text-center font-medium"></div>

        <form id="registrationForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 font-medium">Full Name</label>
                <input type="text" id="fullName" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-orange-500 outline-none">
            </div>

            <div>
                <label class="block text-gray-700 font-medium">Email Address</label>
                <input type="email" id="email" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-orange-500 outline-none">
            </div>

            <div>
                <label class="block text-gray-700 font-medium">Phone Number</label>
                <input type="tel" id="phone" required class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-orange-500 outline-none">
            </div>

            <div>
                <label class="block text-gray-700 font-medium">Your Skills</label>
                <textarea id="skills" rows="3" required placeholder="e.g., Teaching, Social Media, Web Development..." class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
            </div>

            <div>
                <label class="block text-gray-700 font-medium">Availability</label>
                <select id="availability" class="w-full mt-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-orange-500 outline-none">
                    <option value="Weekends">Weekends Only</option>
                    <option value="Weekdays">Weekdays Only</option>
                    <option value="Flexible">Flexible / Anytime</option>
                </select>
            </div>

            <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded transition duration-200">
                Submit Application
            </button>
        </form>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
