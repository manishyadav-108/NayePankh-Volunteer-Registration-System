<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NayePankh 🔒 Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-white shadow-sm border-b p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">
            NayePankh Dashboard <span class="text-sm font-normal text-gray-500">| Volunteer Management</span>
        </h1>
        <div class="flex items-center space-x-4">
            <span class="text-gray-600 font-medium">Welcome, Admin</span>
            <a href="index.html" class="text-sm bg-gray-200 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-300">View Form</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-8 p-4">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-orange-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Total Applications</h3>
                <p id="totalCount" class="text-3xl font-bold text-gray-800 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Status</h3>
                <p class="text-md font-medium text-green-600 mt-3">● System Online</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-700">Registered Volunteers</h2>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 text-gray-600 text-sm uppercase font-semibold border-b">
                            <th class="p-4">Name</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Phone</th>
                            <th class="p-4">Skills</th>
                            <th class="p-4">Availability</th>
                            <th class="p-4">Date Joined</th>
                        </tr>
                    </thead>
                    <tbody id="volunteerTableBody" class="text-gray-700 text-sm divide-y">
                        <tr>
                            <td colspan="6" class="p-4 text-center text-gray-500">Loading volunteer data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
